<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amazon Login</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<!-- HEADER -->

<header>

<div class="navbar">

<div class="nav-logo">
<h2>amazon</h2>
</div>

<div id="userDisplay">
Hello, Guest
</div>

<div class="cart-icon">
<a href="cart.html">
<i class="fa-solid fa-cart-shopping"></i>
<span id="cart-count">0</span>
</a>
</div>

</div>

</header>

<!-- LOGIN FORM -->

<div class="login-container">

<h2>Sign In</h2>

<label>Email</label>

<input
type="email"
id="email"
placeholder="Enter Email">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="loginUser()">
Sign In
</button>

<br><br>

<p>
New User?
<a href="#">
Create Account
</a>
</p>

<br>

<a href="index.html">
← Back to Home
</a>

</div>

<!-- FOOTER -->

<footer>

<div class="copyright">
© 2026 Amazon Clone Project
</div>

</footer>

<script src="script.js"></script>

</body>
</html>
